l_english:
 occitania_rise1_t:0 "The Final Claim"
 occitania_rise1_d:0 "For generations, the lords of Aquitaine have asserted their right to the throne of France. Diplomats have pressed our claims, marriages have been arranged, and banners have been raised in rebellion. Yet, each attempt has ended in disappointment. The crown in Paris remains beyond our grasp.\nNow, however, circumstances once again conspire in our favor. The French realm is troubled, and our supporters whisper that the moment has come at last. Our court is divided; some urge caution, warning that we have already squandered blood and treasure on lost causes. Others insist that destiny does not grant endless opportunities. If we let this moment pass, the claim of Aquitaine may fade into little more than a memory. But if we march, we march knowing this may be our final chance to seize what we have long believed is rightfully ours. \nThe question now rests before the court...and before history itself."


 war_france:0 "Let us teach them how to war."
 peace_france:0 "Maybe it's for the best we give up..."


 occitania_capital_t:0 "The Burgeoning Capital"
 occitania_capital_d:0 "With the centralization of the Occitanian region around our rule, we have seen more and more people flock from the northern Occitanian cities, such as Paris and Calais, to our capital in Bordeaux. The city itself has become a burgeoning center for arts and commerce, and it seems set to become one of the greatest cities of Europe."

 develop_guy_capital:0 "This can only be a good thing!"



 occitania_seize_france_t:0 "Consolidating our Grip"
 occitania_seize_france_d:0 "We've done it! By claiming the French throne, we have secured a claim to the entirety of what shall now be called North Occitania! Despite the persistence of the Normans within England, we can now claim true hegemony over our northern brethren. We must now kick them out of our lands, and truly reclaim the throne of France for ourselves!"

 claim_france:0 "Onwards, to victory!"
 claim_france_tooltip:0 "We will gain cores across France!"


 new_occitan_king_t:0 "A New Occitan King"
 new_occitan_king_d:0 "A young scion of our house, Henri de Poitou, has recently gained notoriety for his towering intellect at such a young age. There is whisper amongst many nobles of situating him as heir, to secure the future of our realm in face of the threats we face both internally and externally. This whispering has reached the King in the form of a petition. Should we accept him, or not?"
 accept_occitan_king:0 "Accept the Boy"
 decline_occitan_king:0 "Decline His Claim"

 new_general_t:0 "A Promising General"
 new_general_d:0 "A talented military leader has risen through the ranks, displaying exceptional skill and leadership. His skills, honed by decades of war against England, Genoa, and the various Germanic counties make him a force to be reckoned with."
 new_general:0 "Appoint the General"



 change_name_aquitaine_title:0 "(Cosmetic) Change Nation Name to Aquitaine"
 change_name_aquitaine_desc:0 "Change the nation name back to Aquitaine."

 AQT:0 "Aquitaine"
 AQT_ADJ:0 "Aquitanian"



 claiming_normandy_t:0 "The Norman Question"
 claiming_normandy_d:0 "With the collapse of English authority and the rise of new powers across the Channel, Normandy stands vulnerable. As the rightful heirs to these lands, we may press our claim and bring Normandy back under the French crown."
 claim_normandy_yes:0 "Reclaim Normandy!"

 claiming_brittany_t:0 "The Fate of Brittany"
 claiming_brittany_d:0 "With Normandy secured under our rule, the question of Brittany remains. With our subjugation of Normandy, we have inherited the claim they held over the entirety of England. It may not be entirely out of the picture to try conquer England for ourselves..."
 claim_brittany_yes:0 "Claim Dominion over the Celts"
 claim_brittany_no:0 "Let them remain, as is."

 claim_normandy_no:0 "This all sounds a bit too hasty."

 print_money_t:0 "The Royal Mint Overflows"
 print_money_d:0 "Our treasury advisors have proposed an unprecedented measure to curb our extreme debt crisis: ordering the royal mint to produce currency far beyond our usual means. The influx of coin would solve our immediate financial woes, but flooding the realm with new money risks devaluing our currency and stirring unrest among merchants and nobles alike. How shall we proceed, Your Majesty?"
 print_money_super_yes:0 "Print without restraint! Fill the coffers to the brim! No more debt!"
 print_money_yes:0 "We NEED more money, now! But show some restraint!"
 print_money_no:0 "We must not debase our currency. Fiscal discipline above all. Debt is temporary, anyways."



 